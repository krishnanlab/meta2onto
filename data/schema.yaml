components:
  schemas:
    Cart:
      type: object
      description: Serializer for Cart model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        studies:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
      required:
      - id
      - name
      - studies
    CartItem:
      type: object
      description: Serializer for CartItem model.
      properties:
        id:
          type: string
          readOnly: true
        added:
          type: string
          format: date-time
          readOnly: true
      required:
      - added
      - id
    GEOPlatform:
      type: object
      description: Serializer for GEOPlatform model.
      properties:
        gpl:
          type: string
        title:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        submission_date:
          type: string
          nullable: true
        last_update_date:
          type: string
          nullable: true
        technology:
          type: string
          nullable: true
        distribution:
          type: string
          nullable: true
        organism:
          type: string
          nullable: true
        manufacturer:
          type: string
          nullable: true
        manufacture_protocol:
          type: string
          nullable: true
        coating:
          type: string
          nullable: true
        catalog_number:
          type: string
          nullable: true
        support:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        web_link:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        data_row_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        supplementary_file:
          type: string
          nullable: true
        bioc_package:
          type: string
          nullable: true
      required:
      - gpl
    GEOSample:
      type: object
      description: Serializer for GEOSample model.
      properties:
        gsm:
          type: string
          description: GEOSample ID
        id:
          type: string
          readOnly: true
        title:
          type: string
          nullable: true
        gpl_raw:
          type: string
          nullable: true
          description: GEOPlatform ID
        status:
          type: string
          nullable: true
        submission_date:
          type: string
          nullable: true
        last_update_date:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        source_name_ch1:
          type: string
          nullable: true
        organism_ch1:
          type: string
          nullable: true
        characteristics_ch1:
          type: string
          nullable: true
        molecule_ch1:
          type: string
          nullable: true
        label_ch1:
          type: string
          nullable: true
        treatment_protocol_ch1:
          type: string
          nullable: true
        extract_protocol_ch1:
          type: string
          nullable: true
        label_protocol_ch1:
          type: string
          nullable: true
        source_name_ch2:
          type: string
          nullable: true
        organism_ch2:
          type: string
          nullable: true
        characteristics_ch2:
          type: string
          nullable: true
        molecule_ch2:
          type: string
          nullable: true
        label_ch2:
          type: string
          nullable: true
        treatment_protocol_ch2:
          type: string
          nullable: true
        extract_protocol_ch2:
          type: string
          nullable: true
        label_protocol_ch2:
          type: string
          nullable: true
        hyb_protocol:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        data_processing:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        supplementary_file:
          type: string
          nullable: true
        data_row_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        channel_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        doc:
          type: string
          nullable: true
        series:
          type: string
          nullable: true
      required:
      - gsm
      - id
    GEOSeries:
      type: object
      description: Serializer for GEOSeries model.
      properties:
        name:
          type: string
          readOnly: true
        id:
          type: string
          readOnly: true
        status:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
        last_update_date:
          type: string
          nullable: true
        pubmed_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        summary:
          type: string
          nullable: true
        description:
          type: string
          readOnly: true
        type:
          type: string
          nullable: true
        contributor:
          type: string
          nullable: true
        web_link:
          type: string
          nullable: true
        overall_design:
          type: string
          nullable: true
        repeats:
          type: string
          nullable: true
        repeats_sample_list:
          type: string
          nullable: true
        variable:
          type: string
          nullable: true
        variable_description:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        supplementary_file:
          type: string
          nullable: true
        confidence:
          type: object
          additionalProperties: {}
          description: Compute confidence level based on prob.
          readOnly: true
        sample_count:
          type: integer
          description: Get the number of samples associated with this series.
          readOnly: true
        database:
          type: array
          items:
            type: string
          readOnly: true
        platform:
          type: array
          items:
            type: string
          description: Get the platform name associated with this series.
          readOnly: true
        keywords:
          type: array
          items:
            type: string
          description: Extract keywords from the series summary.
          readOnly: true
        classification:
          type: string
          description: Returns values Positive or Negative; supposed to represent
            'Classification of study in model training'?
          readOnly: true
      required:
      - classification
      - confidence
      - database
      - description
      - id
      - keywords
      - name
      - platform
      - sample_count
      - submitted_at
    OntologySearchResults:
      type: object
      description: Serializer for OntologySearchResults model.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          readOnly: true
        series:
          type: string
          readOnly: true
        ontology:
          type: string
        type:
          type: string
        synonym:
          type: string
        scope:
          type: string
        sim:
          type: number
          format: double
        scope_weight:
          type: number
          format: double
        overall_rank:
          type: number
          format: double
        is_exact:
          type: boolean
      required:
      - description
      - id
      - is_exact
      - name
      - ontology
      - overall_rank
      - scope
      - scope_weight
      - series
      - sim
      - synonym
      - type
    Organism:
      type: object
      description: Serializer for Organism model.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
      required:
      - id
      - name
    PaginatedCartList:
      type: object
