openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/cart/:
    get:
      operationId: cart_list
      description: |-
        API endpoint for viewing and managing Carts.
        Accessible at /api/cart/
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - cart
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCartList'
          description: ''
    post:
      operationId: cart_create
      description: |-
        Create a new cart with the given name.

        Expects a JSON body with the following structure:
        {
            "studies": [
                {
                "id": "GSE35357",
                "added": "2025-12-12T11:21:35.895Z"
                },
                {
                "id": "GSE149008",
                "added": "2025-12-12T11:21:36.627Z"
                },
                {
                "id": "GSE45968",
                "added": "2025-12-12T11:21:37.293Z"
                }
            ],
            "name": "yowza"
        }
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cart'
        required: true
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/{id}/:
    get:
      operationId: cart_retrieve
      description: |-
        API endpoint for viewing and managing Carts.
        Accessible at /api/cart/
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this cart.
        required: true
      tags:
      - cart
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    put:
      operationId: cart_update
      description: |-
        API endpoint for viewing and managing Carts.
        Accessible at /api/cart/
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this cart.
        required: true
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cart'
        required: true
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    patch:
      operationId: cart_partial_update
      description: |-
        API endpoint for viewing and managing Carts.
        Accessible at /api/cart/
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this cart.
        required: true
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCart'
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    delete:
      operationId: cart_destroy
      description: |-
        API endpoint for viewing and managing Carts.
        Accessible at /api/cart/
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this cart.
        required: true
      tags:
      - cart
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/cart/download/:
    post:
      operationId: cart_download_create
      description: |-
        API endpoint for downloading cart contents.

        Expects a JSON body with the following structure:
        {
            "ids": [
                "GSE35357",
                "GSE149008",
                "GSE45968"
            ]
        }

        Query parameters:
        - type (optional): 'json' or 'csv' (default: 'json')
        - filename (optional): desired filename (default: 'cart_download')
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cart'
        required: true
      security:
      - csrfExemptCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/ontology/search/:
    get:
      operationId: ontology_search_list
      description: |-
        API endpoint for searching ontology terms.
        Accessible at /api/ontology-search/

        Query parameters:
        - query (required): The search query string
        - max_results (optional): Maximum number of results to return (default: 50)
      parameters:
      - in: query
        name: max_results
        schema:
          type: integer
          default: 50
        description: Maximum number of results to return
      - in: query
        name: query
        schema:
          type: string
        description: Search query string
        required: true
      tags:
      - ontology
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologySearchResults'
          description: ''
