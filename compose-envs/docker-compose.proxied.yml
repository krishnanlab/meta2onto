# configuration for when the stack is served behind a server ingress,
# e.g. how it runs on a VM hosting both this app and other ones.

# meta2onto_net will be joined by an "ingress" caddy instance that
# mediates proxying to this app vs. the others by hostname

volumes:
  frontend_built:
  caddy_data:
  caddy_config:
  backend_static:

networks:
  meta2onto_net:
    name: meta2onto_net

services:
  backend:
    volumes:
      - backend_static:/opt/static
    environment:
      - DJANGO_DEBUG=0

  frontend:
    command: sh -c "bun install && bun run build --outDir /tmp/dist && rm -rf /opt/dist/* && mv /tmp/dist /opt/dist"
    volumes:
      - frontend_built:/opt/dist

  caddy:
    image: caddy:2
    restart: unless-stopped
    volumes:
      - ./services/caddy/Caddyfile.proxied:/etc/caddy/Caddyfile
      - frontend_built:/opt/frontend/:ro
      - backend_static:/opt/static/:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      meta2onto_net:
        aliases:
          - meta2onto-caddy
