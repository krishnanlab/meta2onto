# configuration for when the stack is served behind a server ingress,
# e.g. how it runs on a VM hosting both this app and other ones.

# caddy joins both the project's network and the external "ingress" network so
# that the server ingress can direct traffic to meta2onto-caddy, which then
# serves the project-local frontend + proxies to the backend.

volumes:
  frontend_built:
  caddy_data:
  caddy_config:
  backend_static:

networks:
  ingress:
    name: ingress
    external: true

services:
  backend:
    volumes:
      - backend_static:/opt/static
    environment:
      - DJANGO_DEBUG=0

  frontend:
    command: sh -c "bun install && bun run build --emptyOutDir --outDir /tmp/dist && rm -rf /opt/dist/* && mv /tmp/dist /opt/dist"
    volumes:
      - frontend_built:/opt/dist

  caddy:
    image: caddy:2
    restart: unless-stopped
    volumes:
      - ./services/caddy/Caddyfile.proxied:/etc/caddy/Caddyfile
      - frontend_built:/opt/frontend/:ro
      - backend_static:/opt/static/:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      default:
      ingress:
        aliases:
          - meta2onto-caddy
