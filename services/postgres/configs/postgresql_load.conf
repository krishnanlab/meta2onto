# -----------------------------
# PostgreSQL load configuration
# -----------------------------
#
# Optimized for one-shot bulk loading / pg_restore on a general machine >=16GB RAM.
# Not safe for regular serving: disables crash-safety features and autovacuum.

#------------------------------------------------------------------------------
# MEMORY / IO
#------------------------------------------------------------------------------

shared_buffers = 2GB
maintenance_work_mem = 1GB
work_mem = 16MB

effective_cache_size = 12GB
effective_io_concurrency = 200
maintenance_io_concurrency = 200

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG / DURABILITY
#------------------------------------------------------------------------------

# WARNING: these settings are unsafe for production serving. Use only when the
# database can be recreated after a crash or aborted restore.
wal_level = minimal
fsync = off
synchronous_commit = off
full_page_writes = off
wal_compression = on

autovacuum = off

wal_init_zero = off
wal_recycle = off

#------------------------------------------------------------------------------
# REPLICATION / WAL RETENTION
#------------------------------------------------------------------------------

max_wal_senders = 0

max_wal_size = 64GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 60min
checkpoint_flush_after = 2MB
checkpoint_warning = 0

archive_mode = off
max_replication_slots = 0

#------------------------------------------------------------------------------
# LOGGING / LOCALE
#------------------------------------------------------------------------------

log_statement = 'none'
log_timezone = 'Etc/UTC'
timezone = 'Etc/UTC'
